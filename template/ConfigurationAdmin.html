<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - System Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--gray-100);
            color: var(--gray-600);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid var(--gray-200);
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            background: white;
            font-weight: 600;
            font-size: 16px;
            color: var(--gray-900);
        }

        .sidebar-menu {
            padding: 12px 0;
        }

        .nav-link {
            color: #6b7280;
            padding: 12px 20px;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: var(--gray-200);
            color: var(--gray-900);
        }

        .nav-link.active {
            background-color: #dbeafe;
            border-left-color: var(--primary);
            color: var(--primary);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            border-top: 1px solid var(--gray-200);
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .admin-info h6 {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
            margin: 0;
        }

        .admin-info p {
            font-size: 12px;
            color: #9ca3af;
            margin: 0;
        }

        .main-content {
            margin-left: 250px;
            padding: 32px;
            background-color: var(--gray-100);
            min-height: 100vh;
            flex: 1;
            width: 100%;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 16px 20px;
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-900);
        }

        .card-body {
            padding: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-gray {
            background-color: #6b7280;
            border-color: #6b7280;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-gray:hover {
            background-color: #4b5563;
        }

        .form-control, .form-select {
            border-radius: 6px;
            border: 1px solid #d1d5db;
            padding: 9px 12px;
            font-size: 13px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        h6 {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--gray-900);
        }

        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                padding: 16px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-cog"></i> Admin Dashboard
            </div>
            <div class="sidebar-menu">
                <div class="nav-link">
                    <i class="fas fa-chart-line"></i>Dashboard
                </div>
                <div class="nav-link">
                    <i class="fas fa-users"></i>User Management
                </div>
                <div class="nav-link">
                    <i class="fas fa-lock"></i>RBAC Settings
                </div>
                <div class="nav-link active">
                    <i class="fas fa-sliders-h"></i>System Configuration
                </div>
                <div class="nav-link">
                    <i class="fas fa-database"></i>Master Data
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="avatar">AU</div>
                <div class="admin-info">
                    <h6>Admin User</h6>
                    <p>Admin User</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h3 class="section-title">System Configuration</h3>
            <div class="content-grid">
                <div class="card">
                    <div class="card-header">Units of Measure</div>
                    <div class="card-body">
                        <div style="margin-bottom: 16px;">
                            <h6>Weight Units</h6>
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <input type="radio" id="kg" name="weight" checked>
                                <label for="kg" style="margin: 0; cursor: pointer;">Kilograms (kg)</label>
                            </div>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" id="lbs" name="weight">
                                <label for="lbs" style="margin: 0; cursor: pointer;">Pounds (lbs)</label>
                            </div>
                        </div>
                        <div>
                            <h6>Volume Units</h6>
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <input type="radio" id="liters" name="volume" checked>
                                <label for="liters" style="margin: 0; cursor: pointer;">Liters (L)</label>
                            </div>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" id="gallons" name="volume">
                                <label for="gallons" style="margin: 0; cursor: pointer;">Gallons (gal)</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Operational Parameters</div>
                    <div class="card-body">
                        <div style="margin-bottom: 16px;">
                            <label class="form-label">Default Order Lead Time (days)</label>
                            <input type="number" class="form-control" value="3">
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label class="form-label">Minimum Stock Alert Level (%)</label>
                            <input type="number" class="form-control" value="20">
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label class="form-label">Max Inventory Retention Days</label>
                            <input type="number" class="form-control" value="30">
                        </div>
                        <div>
                            <label class="form-label">Currency</label>
                            <select class="form-select">
                                <option selected>USD ($)</option>
                                <option>EUR (€)</option>
                                <option>GBP (£)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn-primary"><i class="fas fa-save"></i> Save Configuration</button>
                <button class="btn-gray"><i class="fas fa-redo"></i> Reset to Defaults</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
