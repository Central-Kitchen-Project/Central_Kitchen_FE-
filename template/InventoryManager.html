<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--gray-100);
            color: var(--gray-600);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background-color: #f8f9fa;
            border-right: 1px solid var(--gray-200);
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            background: white;
            font-weight: 600;
            font-size: 16px;
            color: var(--gray-900);
        }

        .sidebar-menu {
            padding: 12px 0;
        }

        .nav-link {
            color: #6b7280;
            padding: 12px 20px;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: var(--gray-200);
            color: var(--gray-900);
        }

        .nav-link.active {
            background-color: #d1fae5;
            border-left-color: var(--primary);
            color: var(--primary);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            border-top: 1px solid var(--gray-200);
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .admin-info h6 {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
            margin: 0;
        }

        .admin-info p {
            font-size: 12px;
            color: #9ca3af;
            margin: 0;
        }

        .main-content {
            margin-left: 250px;
            padding: 32px;
            background-color: var(--gray-100);
            min-height: 100vh;
            flex: 1;
            width: 100%;
        }

        .card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
        }

        .card-body {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-weight: 500;
            border-bottom: 1px solid var(--gray-200);
            padding: 10px 12px;
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
        }

        td {
            padding: 12px;
            font-size: 13px;
            color: var(--gray-600);
            border-bottom: 1px solid var(--gray-100);
        }

        tbody tr:hover {
            background-color: var(--gray-50);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-warning {
            background-color: #fef3c7;
            color: #92400e;
        }

        .badge-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #059669;
        }

        .form-control {
            border-radius: 6px;
            border: 1px solid #d1d5db;
            padding: 9px 12px;
            font-size: 13px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #9ca3af;
        }

        .modal-close:hover {
            color: var(--gray-900);
        }

        .modal-body {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-save,
        .btn-cancel {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }

        .btn-save {
            background-color: var(--primary);
            color: white;
        }

        .btn-save:hover {
            background-color: #059669;
        }

        .btn-cancel {
            background-color: var(--gray-200);
            color: var(--gray-600);
        }

        .btn-cancel:hover {
            background-color: #d1d5db;
        }

        .btn-small {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--primary);
            transition: all 0.2s;
        }

        .btn-small:hover {
            color: #059669;
        }

        .btn-small-danger {
            color: var(--danger);
        }

        .btn-small-danger:hover {
            color: #dc2626;
        }

        .inventory-actions {
            display: flex;
            gap: 8px;
        }

        .history-item {
            padding: 12px;
            border-left: 3px solid var(--primary);
            background: var(--gray-50);
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .history-time {
            color: #9ca3af;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .history-detail {
            color: var(--gray-900);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .history-reason {
            color: #6b7280;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-briefcase"></i> Manager Dashboard
            </div>
            <div class="sidebar-menu">
                <div class="nav-link">
                    <i class="fas fa-chart-line"></i>Dashboard
                </div>
                <div class="nav-link active">
                    <i class="fas fa-boxes"></i>Inventory Management
                </div>
                <div class="nav-link">
                    <i class="fas fa-clipboard-list"></i>Purchase Orders
                </div>
                <div class="nav-link">
                    <i class="fas fa-industry"></i>Menu Management
                </div>
                <div class="nav-link">
                    <i class="fas fa-chart-bar"></i>Reports & Analytics
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="avatar">M</div>
                <div class="admin-info">
                    <h6>Manager</h6>
                    <p>Central Kitchen #1</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h3 class="section-title">Inventory Management</h3>
            <div class="card">
                <div class="card-body">
                    <div style="display: flex; gap: 16px; margin-bottom: 20px; align-items: center;">
                        <button class="btn-primary" onclick="openAddItemModal()"><i class="fas fa-plus"></i> Add Item</button>
                        <input type="text" class="form-control" id="searchInventory" placeholder="Search inventory..." style="flex: 1;" onkeyup="filterInventory()">
                    </div>
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>Category</th>
                                <th>Current Stock</th>
                                <th>Minimum Level</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <!-- Generated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div class="modal-overlay" id="addItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Item</h3>
                <button class="modal-close" onclick="closeAddItemModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="newItemName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="newItemCategory" placeholder="e.g., Dairy, Oils">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="newItemUnit" placeholder="e.g., units, kg, liters">
                </div>
                <div class="form-group">
                    <label>Initial Quantity</label>
                    <input type="number" id="newItemQuantity" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Minimum Level</label>
                    <input type="number" id="newItemMinLevel" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Price per Unit ($)</label>
                    <input type="number" id="newItemPrice" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeAddItemModal()">Cancel</button>
                <button class="btn-save" onclick="saveNewItem()">Add Item</button>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div class="modal-overlay" id="editItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Item</h3>
                <button class="modal-close" onclick="closeEditItemModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="editItemName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="editItemCategory" placeholder="e.g., Dairy, Oils">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="editItemUnit" placeholder="e.g., units, kg, liters">
                </div>
                <div class="form-group">
                    <label>Minimum Level</label>
                    <input type="number" id="editItemMinLevel" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Price per Unit ($)</label>
                    <input type="number" id="editItemPrice" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditItemModal()">Cancel</button>
                <button class="btn-save" onclick="saveEditItem()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Update Stock Modal -->
    <div class="modal-overlay" id="updateStockModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Update Stock - <span id="updateStockItemName"></span></h3>
                <button class="modal-close" onclick="closeUpdateStockModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Current Stock</label>
                    <input type="text" id="currentStockDisplay" disabled style="background: #f3f4f6;">
                </div>
                <div class="form-group">
                    <label>Action</label>
                    <select id="stockAction" onchange="updateStockDisplay()">
                        <option value="add">Add Stock</option>
                        <option value="subtract">Use/Remove Stock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="stockQuantity" placeholder="0" min="0" onkeyup="updateStockDisplay()">
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="stockReason" placeholder="e.g., New shipment, Daily usage, Inventory check" style="min-height: 80px;"></textarea>
                </div>
                <div class="form-group">
                    <label>New Stock (Preview)</label>
                    <input type="text" id="newStockDisplay" disabled style="background: #f3f4f6;">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeUpdateStockModal()">Cancel</button>
                <button class="btn-save" onclick="saveStockUpdate()">Update Stock</button>
            </div>
        </div>
    </div>

    <!-- Stock History Modal -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Stock History - <span id="historyItemName"></span></h3>
                <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="historyList" style="max-height: 400px; overflow-y: auto;">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeHistoryModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let inventoryItems = [
            { id: 1, name: 'Mozzarella Blend', category: 'Dairy', unit: 'units', quantity: 450, minLevel: 200, price: 5.50, history: [] },
            { id: 2, name: 'Tomato Sauce', category: 'Condiments', unit: 'units', quantity: 180, minLevel: 200, price: 2.30, history: [] },
            { id: 3, name: 'Flour (All-Purpose)', category: 'Dry Goods', unit: 'kg', quantity: 850, minLevel: 500, price: 1.20, history: [] },
            { id: 4, name: 'Olive Oil', category: 'Oils', unit: 'liters', quantity: 45, minLevel: 100, price: 8.50, history: [] }
        ];

        let currentEditItem = null;
        let currentStockUpdateItem = null;

        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('inventoryItems');
            if (saved) {
                inventoryItems = JSON.parse(saved);
            }
            renderInventoryTable();
        });

        function renderInventoryTable() {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';

            inventoryItems.forEach(item => {
                let status = 'In Stock';
                let statusClass = 'badge-success';
                if (item.quantity === 0) {
                    status = 'Out of Stock';
                    statusClass = 'badge-danger';
                } else if (item.quantity < item.minLevel) {
                    status = 'Low Stock';
                    statusClass = 'badge-warning';
                }

                const row = `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.category}</td>
                        <td>${item.quantity} ${item.unit}</td>
                        <td>${item.minLevel} ${item.unit}</td>
                        <td><span class="badge ${statusClass}">${status}</span></td>
                        <td>
                            <div class="inventory-actions">
                                <button class="btn-small" onclick="openUpdateStockModal(${item.id})" title="Update Stock"><i class="fas fa-exchange-alt"></i> Update</button>
                                <button class="btn-small" onclick="openEditItemModal(${item.id})" title="Edit"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn-small" onclick="viewStockHistory(${item.id})" title="History"><i class="fas fa-history"></i> History</button>
                                <button class="btn-small btn-small-danger" onclick="deleteItem(${item.id})" title="Delete"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function filterInventory() {
            const searchValue = document.getElementById('searchInventory').value.toLowerCase();
            const rows = document.querySelectorAll('#inventoryTableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchValue) ? '' : 'none';
            });
        }

        function openAddItemModal() {
            document.getElementById('newItemName').value = '';
            document.getElementById('newItemCategory').value = '';
            document.getElementById('newItemUnit').value = '';
            document.getElementById('newItemQuantity').value = '';
            document.getElementById('newItemMinLevel').value = '';
            document.getElementById('newItemPrice').value = '';
            document.getElementById('addItemModal').classList.add('active');
        }

        function closeAddItemModal() {
            document.getElementById('addItemModal').classList.remove('active');
        }

        function saveNewItem() {
            const name = document.getElementById('newItemName').value;
            const category = document.getElementById('newItemCategory').value;
            const unit = document.getElementById('newItemUnit').value;
            const quantity = parseInt(document.getElementById('newItemQuantity').value);
            const minLevel = parseInt(document.getElementById('newItemMinLevel').value);
            const price = parseFloat(document.getElementById('newItemPrice').value);

            if (!name || !category || !unit || isNaN(quantity) || isNaN(minLevel)) {
                alert('Please fill all required fields');
                return;
            }

            const newItem = {
                id: Math.max(...inventoryItems.map(i => i.id), 0) + 1,
                name,
                category,
                unit,
                quantity,
                minLevel,
                price,
                history: [{ action: 'Initial stock', quantity, reason: 'Item created', date: new Date() }]
            };

            inventoryItems.push(newItem);
            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            renderInventoryTable();
            closeAddItemModal();
            alert('Item added successfully!');
        }

        function openEditItemModal(itemId) {
            const item = inventoryItems.find(i => i.id === itemId);
            if (!item) return;

            currentEditItem = item;
            document.getElementById('editItemName').value = item.name;
            document.getElementById('editItemCategory').value = item.category;
            document.getElementById('editItemUnit').value = item.unit;
            document.getElementById('editItemMinLevel').value = item.minLevel;
            document.getElementById('editItemPrice').value = item.price;
            document.getElementById('editItemModal').classList.add('active');
        }

        function closeEditItemModal() {
            document.getElementById('editItemModal').classList.remove('active');
            currentEditItem = null;
        }

        function saveEditItem() {
            if (!currentEditItem) return;

            currentEditItem.name = document.getElementById('editItemName').value;
            currentEditItem.category = document.getElementById('editItemCategory').value;
            currentEditItem.unit = document.getElementById('editItemUnit').value;
            currentEditItem.minLevel = parseInt(document.getElementById('editItemMinLevel').value);
            currentEditItem.price = parseFloat(document.getElementById('editItemPrice').value);

            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            renderInventoryTable();
            closeEditItemModal();
            alert('Item updated successfully!');
        }

        function openUpdateStockModal(itemId) {
            const item = inventoryItems.find(i => i.id === itemId);
            if (!item) return;

            currentStockUpdateItem = item;
            document.getElementById('updateStockItemName').textContent = item.name;
            document.getElementById('currentStockDisplay').value = item.quantity + ' ' + item.unit;
            document.getElementById('stockQuantity').value = '';
            document.getElementById('stockReason').value = '';
            document.getElementById('stockAction').value = 'add';
            updateStockDisplay();
            document.getElementById('updateStockModal').classList.add('active');
        }

        function closeUpdateStockModal() {
            document.getElementById('updateStockModal').classList.remove('active');
            currentStockUpdateItem = null;
        }

        function updateStockDisplay() {
            if (!currentStockUpdateItem) return;

            const action = document.getElementById('stockAction').value;
            const quantity = parseInt(document.getElementById('stockQuantity').value) || 0;
            let newStock = currentStockUpdateItem.quantity;

            if (action === 'add') {
                newStock = currentStockUpdateItem.quantity + quantity;
            } else {
                newStock = currentStockUpdateItem.quantity - quantity;
            }

            document.getElementById('newStockDisplay').value = newStock + ' ' + currentStockUpdateItem.unit;
        }

        function saveStockUpdate() {
            if (!currentStockUpdateItem) return;

            const action = document.getElementById('stockAction').value;
            const qty = parseFloat(document.getElementById('stockQuantity').value) || 0;
            const reason = document.getElementById('stockReason').value || 'Manual update';

            if (qty === 0) {
                alert('Please enter a quantity');
                return;
            }

            const oldQty = currentStockUpdateItem.quantity;
            if (action === 'add') {
                currentStockUpdateItem.quantity += qty;
            } else {
                if (currentStockUpdateItem.quantity < qty) {
                    alert('Not enough stock to remove!');
                    return;
                }
                currentStockUpdateItem.quantity -= qty;
            }

            currentStockUpdateItem.history.push({
                action: action === 'add' ? 'Add' : 'Remove',
                qty: qty,
                reason: reason,
                date: new Date(),
                before: oldQty,
                after: currentStockUpdateItem.quantity
            });

            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            renderInventoryTable();
            closeUpdateStockModal();
            alert('Stock updated successfully!');
        }

        function viewStockHistory(itemId) {
            const item = inventoryItems.find(i => i.id === itemId);
            if (!item) return;

            document.getElementById('historyItemName').textContent = item.name;
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (item.history && item.history.length > 0) {
                item.history.forEach(entry => {
                    const date = new Date(entry.date).toLocaleString();
                    let detail = `${entry.action}: ${entry.qty} ${item.unit}`;
                    if (entry.before !== undefined) {
                        detail = `${entry.action}: ${entry.before} → ${entry.after} ${item.unit}`;
                    }

                    historyList.innerHTML += `
                        <div class="history-item">
                            <div class="history-time">${date}</div>
                            <div class="history-detail">${detail}</div>
                            <div class="history-reason">${entry.reason}</div>
                        </div>
                    `;
                });
            } else {
                historyList.innerHTML = '<p style="color: #9ca3af; text-align: center;">No history records</p>';
            }

            document.getElementById('historyModal').classList.add('active');
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.remove('active');
        }

        function deleteItem(itemId) {
            if (confirm('Are you sure you want to delete this item?')) {
                inventoryItems = inventoryItems.filter(i => i.id !== itemId);
                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                renderInventoryTable();
                alert('Item deleted successfully!');
            }
        }
    </script>
